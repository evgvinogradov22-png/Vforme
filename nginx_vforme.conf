server {
    listen 80;
    server_name app.nutrikris.ru;
    client_max_body_size 20M;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name app.nutrikris.ru;
    client_max_body_size 20M;

    ssl_certificate /etc/letsencrypt/live/app.nutrikris.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.nutrikris.ru/privkey.pem;

    root /var/www/vforme/frontend/dist;
    index index.html;

    limit_conn perip 50;

    location /ws {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600;
    }

    location /api/auth/ {
        limit_req zone=auth burst=5 nodelay;
        limit_req_status 429;
        proxy_pass http://localhost:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/ {
        limit_req zone=api burst=20 nodelay;
        limit_req_status 429;
        proxy_pass http://localhost:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /uploads/ {
        proxy_pass http://localhost:3001;
    }

    location /admin/ {
        alias /var/www/vforme/admin/dist/;
        try_files $uri $uri/ /admin/index.html;
    }

    location / {
        limit_req zone=general burst=50 nodelay;
        try_files $uri $uri/ /index.html;
    }
}
